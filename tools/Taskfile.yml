version: '3'

env:
  CGO_ENABLED: '0'

vars:
  GO: /usr/local/go/bin/go
  FOUNDRY: '{{.GO}} run ./cmd/foundry'

tasks:

  # ── Workspace ─────────────────────────────────────────────────────────────────

  test:
    desc: "Run tests across all workspace modules"
    cmds:
      - task: _ws:run
        vars: {CMD: "test -count=1"}

  test-race:
    desc: "Run tests with race detector across all workspace modules"
    cmds:
      - task: _ws:run
        vars: {CMD: "test -race -count=1"}

  lint:
    desc: "Run golangci-lint across all workspace modules"
    cmds:
      - task: _ws:run
        vars: {CMD: "run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v{{.GOLANGCI_LINT_VERSION}} run"}

  # ── Starter ───────────────────────────────────────────────────────────────────

  starter:clone:
    desc: "Clone foundry into a new app (usage: task ws:starter:clone -- --target <dir> --module <module>)"
    dir: '{{.ROOT_DIR}}'
    cmds:
      - '{{.GO}} run ./tools/cmd/foundry starter clone {{.CLI_ARGS}}'

  starter:verify:
    desc: "Verify the starter template builds and vets cleanly"
    dir: '{{.ROOT_DIR}}'
    cmds:
      - '{{.GO}} run ./tools/cmd/foundry starter verify'

  # ── Helpers ─────────────────────────────────────────────────────────────────

  _ws:run:
    dir: '{{.ROOT_DIR}}'
    env:
      GONOSUMDB: '*'
    cmd: |
      awk '/^use \(/{f=1;next} /^\)/{f=0} f && NF {print $1}' go.work \
        | while IFS= read -r mod; do
            {{.GO}} {{.CMD}} "${mod}/..." || exit 1
          done
    internal: true
    silent: true
