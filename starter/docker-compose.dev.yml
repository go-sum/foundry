# docker-compose.dev.yml — Dev app overlay
#
# Merged via: docker compose -f docker-compose.data.yml -f docker-compose.yml -f docker-compose.dev.yml
# Never present on production servers.

services:
  db:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
      target: dev_target
      args:
        PG_VERSION: ${PG_VERSION}
    image: foundry-db:dev

  app:
    depends_on:
      db:
        condition: service_healthy
      kv:
        condition: service_healthy
    build:
      context: .
      target: dev_target
      dockerfile: docker/app/Dockerfile
      args:
        GO_VERSION: ${GO_VERSION}
        TOOLS_DEV_IMAGE: ${TOOLS_DEV:-foundry-tools:dev}
    image: foundry-dev
    pids_limit: 512
    read_only: false
    mem_limit: 2g
    memswap_limit: 2g
    tmpfs: !reset []
    security_opt: !reset []
    cap_drop: !reset []
    healthcheck:
      disable: true
    volumes:
      - ../:/app
    working_dir: /app/${PROJECT_NAME}
    restart: on-failure:7
    networks:
      - app_net
      - proxy_net

networks:
  app_net:
  proxy_net:
