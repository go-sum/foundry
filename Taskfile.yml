version: '3'

dotenv:
  - 'starter/.env'
  - 'starter/.versions'

includes:
  app:
    dir: ./starter
    taskfile: ./starter/Taskfile.yml
    flatten: true
    optional: true
  ws:
    dir: '{{.USER_WORKING_DIR}}'
    taskfile: ./tools/Taskfile.yml
    flatten: false
    optional: true

tasks:
  default:
    desc: "List all available tasks"
    silent: true
    cmd: task --list

  # Override starter's build:assets and build:docs — monorepo uses go run against
  # live pkg/ source rather than published package binaries.
  build:assets:pkg:
    desc: "Build static assets via assets CLI (monorepo: live source)"
    dir: ./starter
    deps: [_inspect:tools]
    cmd: '{{.RUN_WITH_TOOLS}} go run ../pkg/assets/cli build all --config
      .assets.yaml --minify'

  build:docs:pkg:
    desc: "Build Hugo documentation (monorepo: live source)"
    dir: ./starter
    deps: [_inspect:tools]
    cmd: '{{.RUN_WITH_TOOLS}} go run ../pkg/docs/cli build'

  # Override flattened app:test — run across all workspace modules, not just starter.
  test:
    desc: "Run tests across all workspace modules"
    cmds:
      - task: ws:test

  test:race:
    desc: "Run tests with race detector across all workspace modules"
    cmds:
      - task: ws:test-race

  lint:
    desc: "Run golangci-lint across all workspace modules"
    cmds:
      - task: ws:lint
