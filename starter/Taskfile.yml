version: '3'

vars:
  GO: /usr/local/go/bin/go
  PROJECT_NAME:
    sh: basename "$(pwd)"
  APP_NAME: "{{.PROJECT_NAME}}-dev"
  DCOMP_ALL: "docker compose -f docker-compose.data.yml -f docker-compose.yml -f
    docker-compose.dev.yml -f docker-compose.caddy.yml --project-name
    {{.PROJECT_NAME}}"
  DCOMP_CADDY: "docker compose -f docker-compose.caddy.yml --project-name {{.PROJECT_NAME}}"
  DCOMP_DATA: "docker compose -f docker-compose.data.yml --project-name {{.PROJECT_NAME}}"
  DCOMP_DEV: "docker compose -f docker-compose.data.yml -f docker-compose.yml -f
    docker-compose.dev.yml --project-name {{.PROJECT_NAME}}"
  DCOMP_TOOLS: "docker compose -f docker-compose.tools.yml --project-name {{.PROJECT_NAME}}"
  DEV_DOMAIN: "{{.PROJECT_NAME}}.test"
  RUN_IN_TOOLS: "docker compose -f docker-compose.data.yml -f
    docker-compose.tools.yml --project-name {{.PROJECT_NAME}} run --rm"
  RUN_WITH_TOOLS: "docker compose -f docker-compose.data.yml -f
    docker-compose.tools.yml --project-name {{.PROJECT_NAME}} run --rm -w
    /app/{{.PROJECT_NAME}} tools"
  TOOLS_IMAGE: "{{.PROJECT_NAME}}-tools"
  TOOLS_DEV: "{{.TOOLS_IMAGE}}:dev"
  TOOLS_PROD: "{{.TOOLS_IMAGE}}:prod"

env:
  APP_NAME: "{{.APP_NAME}}"
  PROJECT_NAME: "{{.PROJECT_NAME}}"
  TOOLS_DEV: "{{.TOOLS_DEV}}"
  TOOLS_PROD: "{{.TOOLS_PROD}}"

tasks:
  # default, test, test:race are omitted — they conflict when this file is
  # included with flatten:true in the root Taskfile; starter:clone injects them.

  # ── Assets ────────────────────────────────────────────────────────────────────
  # Uses pre-built CLI binaries from the tools container.

  build:assets:
    desc: "Build CSS/JS static assets"
    deps: [_inspect:tools]
    cmd: '{{.RUN_WITH_TOOLS}} assets build all --config .assets.yaml --minify'

  build:docs:
    desc: "Build Hugo documentation"
    deps: [_inspect:tools]
    cmd: '{{.RUN_WITH_TOOLS}} docs build'

  build:tools:
    desc: "Rebuild dev toolchain image"
    cmd: "{{.DCOMP_TOOLS}} build tools"

  # ── Data containers (postgres + dragonfly) ────────────────────────────────────

  data:up:
    desc: "Start data containers (postgres, dragonfly) detached"
    cmd: "{{.DCOMP_DATA}} up -d --build"

  data:down:
    desc: "Stop data containers"
    cmd: "{{.DCOMP_DATA}} down"

  data:reset:
    desc: "Stop data containers and remove volumes"
    cmd: "{{.DCOMP_DATA}} down -v"

  # ── Dev stack (data + app + caddy) ────────────────────────────────────────────

  dev:
    desc: "Rebuild and attach to the full dev stack"
    deps:
      - _inspect:tools
      - _net:proxy:ensure
      - task: _caddy:config
        vars: {DOMAIN: "{{.DEV_DOMAIN}}", TLS_CONFIG: "tls internal", DEV_FLAG: "--dev"}
    cmd: "{{.DCOMP_ALL}} up --build {{.CLI_ARGS}}"

  dev:up:
    desc: "Start full dev stack detached"
    deps:
      - _inspect:tools
      - _net:proxy:ensure
      - task: _caddy:config
        vars: {DOMAIN: "{{.DEV_DOMAIN}}", TLS_CONFIG: "tls internal", DEV_FLAG: "--dev"}
    cmd: "{{.DCOMP_ALL}} up --build --detach {{.CLI_ARGS}}"

  dev:down:
    desc: "Stop app and caddy (data containers keep running)"
    cmds:
      - "{{.DCOMP_ALL}} down {{.CLI_ARGS}}"
      - docker network rm "${PROXY_NETWORK:-caddy_net}" 2>/dev/null || true

  dev:logs:
    desc: "Follow dev stack logs"
    cmd: "{{.DCOMP_ALL}} logs -f {{.CLI_ARGS}}"

  dev:prune:
    desc: "Remove all project containers, images, networks, and volumes"
    cmds:
      - "{{.DCOMP_ALL}} down -v --rmi all --remove-orphans"
      - "{{.DCOMP_TOOLS}} down -v --rmi all --remove-orphans"

  # ── Database ──────────────────────────────────────────────────────────────────

  db:compose:
    desc: "Detect schema changes and generate migration file(s) (task db:compose [NAME=<migration_name>])"
    cmds:
      - task: _db:run
        vars: {DB_CMD: "migrate compose{{if .NAME}} {{.NAME}}{{end}}"}
      - task: _db:run
        vars: {DB_CMD: "scaffold --skip-existing"}

  db:migrate:
    desc: "Apply pending database migrations"
    cmd: {task: _db:run, vars: {DB_CMD: "migrate apply"}}

  db:rollback:
    desc: "Roll back the last applied migration"
    cmd: {task: _db:run, vars: {DB_CMD: "migrate rollback"}}

  db:status:
    desc: "Show database migration status"
    cmd: {task: _db:run, vars: {DB_CMD: "migrate status"}}

  db:health:
    desc: "Check database connectivity and schema fingerprint"
    cmd: {task: _db:run, vars: {DB_CMD: health}}

  db:seed:
    desc: "Apply pending seed files"
    cmd: {task: _db:run, vars: {DB_CMD: "seed apply"}}

  # ── Test ──────────────────────────────────────────────────────────────────────

  app:test:
    desc: "Run tests"
    env:
      GONOSUMDB: '*'
    cmd: '{{.GO}} test -count=1 ./...'

  app:test:race:
    desc: "Run tests with race detector"
    env:
      GONOSUMDB: '*'
    cmd: '{{.GO}} test -race -count=1 ./...'

  # ── Secrets & Certs ───────────────────────────────────────────────────────────

  secrets:init:
    desc: "Write secret files from .env into .secrets/ (required before first docker
      compose up)"
    cmd: "{{.GO}} run ./cmd/secrets"

  certs:init:
    desc: "Generate local TLS certificates with mkcert (run once per machine)"
    cmds:
      - mkdir -p docker/caddy/certs
      - >
        {{.RUN_IN_TOOLS}} tools sh -c 'mkcert -install && mkcert -cert-file
        /app/docker/caddy/certs/local.pem -key-file
        /app/docker/caddy/certs/local-key.pem {{.DEV_DOMAIN}}
        "*.{{.DEV_DOMAIN}}" localhost 127.0.0.1'

  # ── Production ────────────────────────────────────────────────────────────────

  prod:build:
    desc: "Build production Docker image"
    preconditions:
      - sh: test -f go.prod.mod
        msg: "go.prod.mod not found — run 'task ws:sync' first to generate it"
    cmd: |
      GITHUB_ACCESS_TOKEN="${GITHUB_ACCESS_TOKEN:-$(grep '^GITHUB_ACCESS_TOKEN=' .env 2>/dev/null | cut -d= -f2-)}"
      export GITHUB_ACCESS_TOKEN
      docker build --target production_target \
        --file docker/app/Dockerfile \
        --build-arg GO_VERSION={{.GO_VERSION}} \
        --build-arg HTMX_VERSION={{.HTMX_VERSION}} \
        --build-arg TAILWIND_VERSION={{.TAILWIND_VERSION}} \
        --build-arg APP_VERSION={{.APP_VERSION}} \
        --build-arg TOOLS_PROD_IMAGE={{.TOOLS_PROD}} \
        --secret id=github_token,env=GITHUB_ACCESS_TOKEN \
        -t {{.PROJECT_NAME}}:latest .

  prod:
    desc: "Build production image and start the production stack"
    deps:
      - prod:build
      - task: _caddy:config
        vars: {DOMAIN: "{{.PROD_DOMAIN}}", TLS_CONFIG: "tls"}
    cmd: "docker compose -f docker-compose.data.yml -f docker-compose.yml -f
      docker-compose.caddy.yml up -d"

  # ── Helpers ───────────────────────────────────────────────────────────────────

  _caddy:config:
    internal: true
    requires:
      vars: [DOMAIN, TLS_CONFIG]
    cmd: sh docker/caddy/gen-caddyfile.sh "{{.DOMAIN}}" "{{.TLS_CONFIG}}" {{.DEV_FLAG}}

  _db:run:
    internal: true
    requires:
      vars: [DB_CMD]
    cmd: "{{.RUN_WITH_TOOLS}} db {{.DB_CMD}}"

  _net:proxy:ensure:
    internal: true
    silent: true
    status:
      - docker network inspect "${PROXY_NETWORK:-caddy_net}" >/dev/null 2>&1
    cmd: docker network create --driver bridge "${PROXY_NETWORK:-caddy_net}"

  _inspect:tools:
    status:
      - docker image inspect {{.TOOLS_DEV}} >/dev/null 2>&1
    cmd: "{{.DCOMP_TOOLS}} build tools"
    internal: true
    silent: true
