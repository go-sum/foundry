version: '3'

env:
  CGO_ENABLED: '0'

vars:
  GO: /usr/local/go/bin/go
  FOUNDRY: '{{.GO}} run ./cmd/foundry'
  FOUNDRY_DOCKER: >-
    docker compose -f starter/docker-compose.data.yml -f starter/docker-compose.yml -f starter/docker-compose.dev.yml --profile tools run --rm tools go run ./tools/cmd/foundry

tasks:

  # ── Workspace ─────────────────────────────────────────────────────────────────

  test:
    desc: "Run tests across all workspace modules"
    cmds:
      - task: _ws:run
        vars: {CMD: "test -count=1"}

  test-race:
    desc: "Run tests with race detector across all workspace modules"
    cmds:
      - task: _ws:run
        vars: {CMD: "test -race -count=1"}

  lint:
    desc: "Run golangci-lint across all workspace modules"
    cmds:
      - task: _ws:run
        vars: {CMD: "run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v{{.GOLANGCI_LINT_VERSION}} run"}

  # ── Packages ──────────────────────────────────────────────────────────────────

  list:
    desc: "List all packages and their versions"
    dir: '{{.ROOT_DIR}}'
    cmds:
      - '{{.GO}} run ./tools/cmd/foundry pkg list'

  push:
    desc: "Push a package subtree to its mirror repo (usage: task ws:push -- <name|all>)"
    dir: '{{.ROOT_DIR}}'
    cmds:
      - '{{.FOUNDRY_DOCKER}} pkg push {{.CLI_ARGS}}'

  release:
    desc: "Release a package (usage: task ws:release -- <name|all> [version])"
    dir: '{{.ROOT_DIR}}'
    cmds:
      - '{{.FOUNDRY_DOCKER}} pkg release {{.CLI_ARGS}}'

  status:
    desc: "Show package sync status (usage: task ws:status -- <name|all>)"
    dir: '{{.ROOT_DIR}}'
    cmds:
      - '{{.FOUNDRY_DOCKER}} pkg status {{.CLI_ARGS}}'

  sync:
    desc: "Sync starter/go.prod.mod from starter/go.mod (strip replace directives)"
    dir: '{{.ROOT_DIR}}'
    cmds:
      - '{{.GO}} run ./tools/cmd/foundry pkg sync'

  deploy:
    desc: "Full deploy pipeline (usage: task ws:deploy -- [--auto] [version])"
    dir: '{{.ROOT_DIR}}'
    cmds:
      - '{{.FOUNDRY_DOCKER}} pkg deploy {{.CLI_ARGS}}'

  # ── Starter ───────────────────────────────────────────────────────────────────

  starter:clone:
    desc: "Clone foundry into a new app (usage: task ws:starter:clone -- --target <dir> --module <module>)"
    dir: '{{.ROOT_DIR}}'
    cmds:
      - '{{.GO}} run ./tools/cmd/foundry starter clone {{.CLI_ARGS}}'

  starter:verify:
    desc: "Verify the starter template builds and vets cleanly"
    dir: '{{.ROOT_DIR}}'
    cmds:
      - '{{.GO}} run ./tools/cmd/foundry starter verify'

  # ── Helpers ─────────────────────────────────────────────────────────────────

  _ws:run:
    dir: '{{.ROOT_DIR}}'
    env:
      GONOSUMDB: '*'
    cmd: |
      awk '/^use \(/{f=1;next} /^\)/{f=0} f && NF {print $1}' go.work \
        | while IFS= read -r mod; do
            {{.GO}} {{.CMD}} "${mod}/..." || exit 1
          done
    internal: true
    silent: true
