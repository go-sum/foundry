paths:
  source_dir: static
  public_dir: public/static
  public_prefix: /static

js:
  downloads:
    - name: htmx
      # version resolved from HTMX_VERSION env var (set in .versions)
      version: ""
      url: "https://unpkg.com/htmx.org@{version}/dist/htmx.min.js"
      target: js/htmx.min.js
  bundles: []

css:
  - tool: tailwindcss
    input: tailwind.css
    output: css/app.css

fonts:
  downloads: []

sprites:
  lucide-icons:
    enabled: true
    target: img/svg/lucide-icons.svg
    sources:
      - path: "https://raw.githubusercontent.com/lucide-icons/lucide/main/icons/"
        files:
          - "chevron-down.svg"
          - "chevron-left.svg"
          - "chevron-right.svg"
          - "chevrons-up.svg"
          - "x.svg"
  theme-icons:
    enabled: true
    target: img/svg/theme-icons.svg
    sources:
      - path: "img/svg/"
        files:
          - "sun.svg"
          - "moon.svg"
          - "monitor.svg"
