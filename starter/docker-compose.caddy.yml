# docker-compose.caddy.yml — Caddy reverse proxy
#
# Independent lifecycle: start/stop without affecting app or data containers.
# In dev: uses mkcert certificates from /opt/vps/certs/
# In internal staging: may also consume pre-generated private certs if trusted.
# In public environments: replace tls directive in Caddyfile with ACME or
# provider-managed origin certificates such as Cloudflare.

services:
  caddy:
    image: caddy:2-alpine
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=32m
      - /config:size=8m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 128m
    memswap_limit: 128m
    pids_limit: 64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/vps/certs:/etc/caddy/certs:ro
      - caddy_data:/data
    restart: unless-stopped
    networks:
      - proxy_net

volumes:
  caddy_data:

networks:
  proxy_net:
    driver: bridge
    name: ${PROXY_NETWORK:-caddy_net}
