x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    image: ${APP_IMAGE:-foundry:latest}
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    memswap_limit: 256m
    pids_limit: 128
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      SERVER_TRUSTED_PROXIES: ${SERVER_TRUSTED_PROXIES:-}
    secrets:
      - DATABASE_URL
      - SECURITY_CSRF_KEY
      - SECURITY_AUTH_TOKEN_KEY
      - KV_PASSWORD
    depends_on:
      db:
        condition: service_healthy
      kv:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/opt/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - app_net
      - proxy_net

secrets:
  DATABASE_URL:
    file: .secrets/DATABASE_URL
  SECURITY_CSRF_KEY:
    file: .secrets/SECURITY_CSRF_KEY
  SECURITY_AUTH_TOKEN_KEY:
    file: .secrets/SECURITY_AUTH_TOKEN_KEY

networks:
  app_net:
  proxy_net:
    external: true
    name: ${PROXY_NETWORK:-caddy_net}
