version: '3'

dotenv:
  - '.versions'
  - 'starter/.env'

vars:
  GO: /usr/local/go/bin/go
  GOROOT:
    sh: '{{.GO}} env GOROOT'
  BUILD_DIR: ./starter/build
  TAILWIND: /usr/local/bin/tailwindcss
  STATIC_DIR: ./starter/public/static

tasks:
  default:
    desc: "List all available tasks"
    silent: true
    cmd: task --list

  build:assets:
    desc: "Build static assets (CSS via Tailwind, copy HTMX)"
    cmds:
      - mkdir -p {{.STATIC_DIR}}/css {{.STATIC_DIR}}/js
      - cp /usr/local/lib/htmx.min.js {{.STATIC_DIR}}/js/htmx.min.js
      - '{{.TAILWIND}} --input ./starter/tailwind.css --output {{.STATIC_DIR}}/css/app.css --minify'

  dev:
    desc: "Run the starter app in native Go mode"
    deps: [build:assets]
    cmd: '{{.GO}} run ./starter/cmd/server'

  build:
    desc: "Build the starter app (native)"
    cmd: '{{.GO}} build -o {{.BUILD_DIR}}/server ./starter/cmd/server'

  test:
    desc: "Run all tests"
    env:
      GONOSUMDB: '*'
    cmds:
      - '{{.GO}} test ./pkg/web/...'
      - '{{.GO}} test ./pkg/web/render/...'
      - '{{.GO}} test ./starter/...'

  test:race:
    desc: "Run all tests with race detector"
    env:
      GONOSUMDB: '*'
    cmds:
      - '{{.GO}} test -race ./pkg/web/...'
      - '{{.GO}} test -race ./pkg/web/render/...'
      - '{{.GO}} test -race ./starter/...'

