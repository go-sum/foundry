root = "."
tmp_dir = "tmp"

[build]
  pre_cmd = ["assets build css --incremental", "assets sprites --incremental", "assets build js --incremental"]
  cmd = "go build -o ./tmp/server ./cmd/server"
  entrypoint = "./tmp/server"
  delay = 500
  exclude_dir = [".claude", ".git", ".secrets", "docker", "public", "tmp"]
  exclude_file = ["docker*.yml"]
  include_ext = ["go", "html", "tmpl", "yaml", "toml", "css", "js", "ts"]
  kill_delay = "1s"
  rerun = false
  send_interrupt = true

[log]
  time = false

[misc]
  clean_on_exit = true

[proxy]
  enabled = true
  proxy_port = 8080
  app_port = 3000
