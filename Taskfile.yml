version: '3'

dotenv:
  - 'starter/.env'
  - 'starter/.versions'

includes:
  git:
    taskfile: ./Taskfile.git.yml
    flatten: false
  app:
    dir: ./starter
    taskfile: ./starter/Taskfile.yml
    flatten: true
    optional: true
  ws:
    dir: '{{.USER_WORKING_DIR}}'
    taskfile: ./tools/Taskfile.yml
    flatten: false
    optional: true

tasks:
  default:
    desc: "List all available tasks"
    silent: true
    cmd: task --list

  # Override starter's build:assets and build:docs — monorepo uses pre-built
  # CLI binaries from the tools container (built from workspace source).
  build:assets:pkg:
    desc: "Build static assets via assets CLI (monorepo: live source)"
    dir: ./starter
    deps: [_inspect:tools]
    cmd: '{{.RUN_WITH_TOOLS}} assets build all --config .assets.yaml --minify'

  build:docs:pkg:
    desc: "Build Hugo documentation (monorepo: live source)"
    dir: ./starter
    deps: [_inspect:tools]
    cmd: '{{.RUN_WITH_TOOLS}} docs build'

  # Override flattened app:test — run across all workspace modules, not just starter.
  test:
    desc: "Run tests across all workspace modules"
    cmds:
      - task: ws:test

  test:race:
    desc: "Run tests with race detector across all workspace modules"
    cmds:
      - task: ws:test-race

  lint:
    desc: "Run golangci-lint across all workspace modules"
    cmds:
      - task: ws:lint

  # ── MCP server ────────────────────────────────────────────────────────────────

  mcp:up:
    desc: "Build and start the gomcp MCP server (Go LSP, governing docs, file search) on port 8086"
    cmds:
      - docker build -f starter/docker/mcp/gomcp.dockerfile -t go-mcp starter/docker/mcp/
      - docker rm -f go-mcp 2>/dev/null || true
      - docker run -d --name go-mcp -p 8086:8086 -v "{{.USER_WORKING_DIR}}:/src/{{base .USER_WORKING_DIR}}:ro" -e WORKSPACE=/src/{{base .USER_WORKING_DIR}} go-mcp

  mcp:down:
    desc: "Stop and remove the gomcp MCP server"
    cmd: docker rm -f go-mcp 2>/dev/null || true
